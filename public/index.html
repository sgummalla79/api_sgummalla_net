<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>api.sgummalla.net</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Courier New', Courier, monospace;
      color: #e0e0e0;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-size: 0.85rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .dot {
      color: #4ade80;
    }

    p {
      font-size: 1rem;
      color: #666;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">sgummalla.net</div>
    <h1>API <span class="dot">coming soon</span></h1>
    <p>check back later</p>
  </div>
</body>
</html>
